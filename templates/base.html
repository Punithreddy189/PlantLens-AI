<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CSS for grid system, though we use custom components -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    
    <title>
        {% block pagetitle %}PlantLens AI{% endblock pagetitle %}
    </title>
</head>
<body>
    
    <!-- Fixed Glassmorphic Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top w-100 gs-reveal">
        <div class="container">
            <a class="navbar-brand text-gradient" href="/">
                <i class="fa-solid fa-leaf text-success"></i> PlantLens<span style="color:var(--text-main); font-weight: 300;">AI</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/index">AI Engine</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/market">Supplements</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content wrapper to push footer down -->
    <main class="main-content" style="margin-top: 80px;">
        {% block body %}
        {% endblock body %}
    </main>

    <!-- Dark Custom Footer -->
    <footer class="footer-custom gs-reveal-up">
        <div class="container text-center">
            <div class="social-links mb-4">
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
            </div>
            <ul class="list-inline mb-4">
                <li class="list-inline-item mx-3"><a href="/" class="text-decoration-none text-muted">Home</a></li>
                <li class="list-inline-item mx-3"><a href="/index" class="text-decoration-none text-muted">AI Engine</a></li>
                <li class="list-inline-item mx-3"><a href="#" class="text-decoration-none text-muted">About</a></li>
            </ul>
            <p class="text-muted small mb-0">Powered by advanced Deep Learning. Created by PlantLens Team.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Initialize Animations -->
    <script>
        gsap.registerPlugin(ScrollTrigger);
        
        // Navbar animation
        gsap.from(".navbar-custom", {
            y: -100,
            opacity: 0,
            duration: 1,
            ease: "power3.out"
        });

        // Footer animation
        gsap.from(".footer-custom", {
            scrollTrigger: {
                trigger: ".footer-custom",
                start: "top 95%"
            },
            y: 50,
            opacity: 0,
            duration: 1,
            ease: "power3.out"
        });
    </script>
</body>
</html>
